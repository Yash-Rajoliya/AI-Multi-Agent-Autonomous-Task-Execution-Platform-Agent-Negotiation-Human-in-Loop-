name: Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [api-gateway, orchestrator-service, agent-runtime, worker-service]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ matrix.service }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install Dependencies
        run: |
          pip install -U pip
          pip install poetry
          poetry install

      - name: Build Package
        run: |
          poetry build

      - name: Validate Imports
        run: |
          python -m compileall .