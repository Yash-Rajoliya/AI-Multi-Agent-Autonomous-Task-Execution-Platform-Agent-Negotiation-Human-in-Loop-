name: Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push API
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway -f deployments/docker/api.Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway

      - name: Build & Push Worker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/worker -f deployments/docker/worker.Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/worker

      - name: Build & Push Orchestrator
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/orchestrator -f deployments/docker/orchestrator.Dockerfile .
          docker push ${{ secrets.DOCKER_USERNAME }}/orchestrator

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deployments/kubernetes/manifests/